<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>زراعة شات - مساعد زراعي ذكي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🌾</span>
        <span class="logo-text">زراعة شات</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">+ محادثة جديدة</button>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="conversations" onclick="switchSidebarTab('conversations')">💬 المحادثات</button>
      <button class="sidebar-tab" data-tab="knowledge" onclick="switchSidebarTab('knowledge')">📚 المعرفة</button>
      <button class="sidebar-tab" data-tab="admin" onclick="switchSidebarTab('admin')">⚙️ الإدارة</button>
    </div>
    <div class="sidebar-content" id="sidebarConversations"></div>
    <div class="sidebar-content" id="sidebarKnowledge" style="display:none"></div>
    <div class="sidebar-content" id="sidebarAdmin" style="display:none"></div>
    <div class="sidebar-footer">
      <button onclick="toggleTheme()" title="التبديل بين الوضع الداكن والفاتح">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Main -->
  <div class="main">
    <header class="chat-header">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="القائمة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="chat-header-info">
        <h1>🌾 زراعة شات</h1>
        <span class="status-badge" id="statusBadge">متصل</span>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" onclick="newChat()" title="محادثة جديدة">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <div class="settings-wrap">
          <button class="icon-btn" onclick="toggleSettingsMenu()" title="الإعدادات">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="settings-menu" id="settingsMenu">
          <div class="settings-group">
            <label>المظهر</label>
            <div class="toggle-group">
              <button data-theme="dark" onclick="setTheme('dark')">داكن</button>
              <button data-theme="light" onclick="setTheme('light')">فاتح</button>
              <button data-theme="system" onclick="setTheme('system')">النظام</button>
            </div>
          </div>
          <div class="settings-group">
            <label>حجم الخط</label>
            <div class="toggle-group">
              <button data-size="small" onclick="setFontSize('small')">صغير</button>
              <button data-size="medium" onclick="setFontSize('medium')">متوسط</button>
              <button data-size="large" onclick="setFontSize('large')">كبير</button>
            </div>
          </div>
          <div class="settings-group">
            <label>نموذج الذكاء الاصطناعي</label>
            <div class="toggle-group">
              <button data-model="groq" onclick="setModel('groq')">Groq</button>
              <button data-model="openai" onclick="setModel('openai')">OpenAI</button>
            </div>
          </div>
          <div class="settings-group">
            <label>تحسينات البحث</label>
            <div class="checkbox-group">
              <label class="checkbox-label"><input type="checkbox" id="useHyde" onchange="saveRetrievalOptions()"> HyDE (توليد افتراضي)</label>
              <label class="checkbox-label"><input type="checkbox" id="useExpansion" onchange="saveRetrievalOptions()"> توسيع الاستعلام</label>
              <label class="checkbox-label"><input type="checkbox" id="useSelfRag" onchange="saveRetrievalOptions()"> Self-RAG</label>
            </div>
          </div>
          <div class="settings-group">
            <button class="btn-danger" onclick="clearAllData()">حذف جميع المحادثات</button>
          </div>
        </div>
      </div>
    </header>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <textarea id="questionInput" rows="1" placeholder="اكتب سؤالك هنا..." autofocus></textarea>
      <button id="sendBtn" class="btn-send" aria-label="إرسال">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmOverlay" onclick="closeConfirm()"></div>
  <div class="modal" id="confirmModal">
    <div class="modal-icon">⚠️</div>
    <h3 class="modal-title" id="confirmTitle">تأكيد</h3>
    <p class="modal-message" id="confirmMessage">هل أنت متأكد؟</p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeConfirm()">إلغاء</button>
      <button class="modal-btn modal-btn-confirm" id="confirmBtn">تأكيد</button>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>
</html>
