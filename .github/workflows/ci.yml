name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npx eslint --no-error-on-unmatched-pattern "**/*.js"
        continue-on-error: true

  ingest:
    name: Knowledge Ingestion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run seed (knowledge ingestion)
        run: npm run seed
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'skip' }}

  server:
    name: Server Health Check
    runs-on: ubuntu-latest
    needs: [lint, ingest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Start server and check health
        run: |
          node server/index.js &
          SERVER_PID=$!
          sleep 10
          curl -s http://localhost:3000/api/health || echo "Health check failed (expected if no API key)"
          kill $SERVER_PID 2>/dev/null || true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || '' }}
          PORT: 3000
